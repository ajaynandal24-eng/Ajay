<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScheduleApp – Time Schedule & Appointments</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Favicon (inline SVG data-URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📅</text></svg>" />
</head>
<body>

<!-- ═══════════════════════ HEADER ═══════════════════════ -->
<header>
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8"  y1="2" x2="8"  y2="6"/>
      <line x1="3"  y1="10" x2="21" y2="10"/>
    </svg>
    <span>ScheduleApp</span>
  </h1>

  <div class="header-actions">
    <button class="btn btn-white" id="btnAddHeader" aria-label="New appointment">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New
    </button>
  </div>
</header>

<!-- ═══════════════════════ APP LAYOUT ═══════════════════════ -->
<div class="app-layout">

  <!-- ── Left Sidebar ── -->
  <aside>

    <!-- Mini Calendar -->
    <div class="card" style="margin-bottom:16px">
      <div class="calendar-nav">
        <button class="nav-btn" id="calPrev" aria-label="Previous month" title="Previous month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="month-label" id="calMonthLabel"></span>
        <button class="nav-btn" id="calNext" aria-label="Next month" title="Next month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <div class="calendar-grid" id="calGrid">
        <!-- Day name headers (static) -->
        <div class="day-name">Su</div>
        <div class="day-name">Mo</div>
        <div class="day-name">Tu</div>
        <div class="day-name">We</div>
        <div class="day-name">Th</div>
        <div class="day-name">Fr</div>
        <div class="day-name">Sa</div>
        <!-- Days inserted by JS -->
      </div>

      <div style="padding:0 12px 14px; display:flex; justify-content:center;">
        <button class="btn btn-ghost btn-sm" id="calToday">Today</button>
      </div>
    </div>

    <!-- Quick "Add" button -->
    <button class="btn btn-primary" id="btnAdd" style="width:100%; justify-content:center; padding:12px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Appointment
    </button>

  </aside>

  <!-- ── Main Content ── -->
  <main class="main-panel">

    <!-- Stats strip -->
    <div class="stats-strip" id="statsStrip"></div>

    <!-- View tabs -->
    <div class="view-tabs">
      <button class="tab-btn active" id="tabList">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6"  x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        List
      </button>
      <button class="tab-btn" id="tabTimeline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Timeline
      </button>
    </div>

    <!-- Appointment panel -->
    <div class="appointments-container">
      <div class="appointments-header">
        <h2 id="aptDateLabel"></h2>
        <span class="date-badge" id="aptDateBadge" aria-hidden="true"></span>
      </div>

      <!-- Search & filter -->
      <div class="filter-bar">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search appointments…"
          aria-label="Search appointments"
        />
        <select class="filter-select" id="catFilter" aria-label="Filter by category">
          <option value="">All categories</option>
          <option value="General">General</option>
          <option value="Meeting">Meeting</option>
          <option value="Medical">Medical</option>
          <option value="Personal">Personal</option>
          <option value="Work">Work</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Dynamic list/timeline injected here -->
      <div id="aptListContainer"></div>
    </div>

  </main>
</div>

<!-- ═══════════════════════ MODAL ═══════════════════════ -->
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">New Appointment</h3>
      <button class="close-btn" id="btnCloseModal" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <!-- Title -->
      <div class="form-group">
        <label for="fTitle">Title <span style="color:var(--danger)">*</span></label>
        <input type="text" class="form-control" id="fTitle" placeholder="e.g. Team Meeting" autocomplete="off" />
      </div>

      <!-- Date + Time row -->
      <div class="form-row">
        <div class="form-group">
          <label for="fDate">Date <span style="color:var(--danger)">*</span></label>
          <input type="date" class="form-control" id="fDate" />
        </div>
        <div class="form-group">
          <label for="fCategory">Category</label>
          <select class="form-control" id="fCategory">
            <option value="General">General</option>
            <option value="Meeting">Meeting</option>
            <option value="Medical">Medical</option>
            <option value="Personal">Personal</option>
            <option value="Work">Work</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Start / End time -->
      <div class="form-row">
        <div class="form-group">
          <label for="fStart">Start Time</label>
          <input type="time" class="form-control" id="fStart" />
        </div>
        <div class="form-group">
          <label for="fEnd">End Time</label>
          <input type="time" class="form-control" id="fEnd" />
        </div>
      </div>

      <!-- Location -->
      <div class="form-group">
        <label for="fLocation">Location</label>
        <input type="text" class="form-control" id="fLocation" placeholder="e.g. Conference Room B" autocomplete="off" />
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label for="fNotes">Notes</label>
        <textarea class="form-control" id="fNotes" placeholder="Any additional details…"></textarea>
      </div>

      <!-- Color picker -->
      <div class="form-group">
        <label>Color</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="btnCancelModal">Cancel</button>
      <button class="btn btn-success" id="btnSaveModal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Save
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ TOAST CONTAINER ═══════════════════════ -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
